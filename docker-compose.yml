# ──────────────────────────────────────────────────────────────
#  KazUTB Smart Library — Docker Compose (live-sync dev runtime)
# ──────────────────────────────────────────────────────────────
#
#  Services
#  --------
#  postgres      — PostgreSQL 18 with existing data
#  app           — Laravel 13 (nginx + php-fpm) on port 80
#  frontend-dev  — Vite dev server on port 5173 for live JS/CSS updates
#
#  Quick start
#  -----------
#  1. Ensure .env is configured
#  2. docker compose up --build -d app frontend-dev
#  3. Open http://localhost
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kazutb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kazutb_library}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kazutb_user} -d ${POSTGRES_DB:-kazutb_library}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel App (nginx + php-fpm) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: "${APP_NAME:-KazUTB Smart Library}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_LIVE_SYNC: "${APP_LIVE_SYNC:-true}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: "${POSTGRES_DB:-kazutb_library}"
      DB_USERNAME: "${POSTGRES_USER:-kazutb_user}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      EXTERNAL_AUTH_LOGIN_URL: "${EXTERNAL_AUTH_LOGIN_URL:-http://crm.local/api/login}"
      EXTERNAL_AUTH_DEVICE_NAME: "${EXTERNAL_AUTH_DEVICE_NAME:-web}"
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./:/app
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost/api/v1/catalog-db?limit=1 || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend-dev:
    image: node:22
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - app
    environment:
      VITE_HMR_HOST: "${VITE_HMR_HOST:-localhost}"
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -lc "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
    external: true
    name: kazutb-smart-library-main_postgres_data
  frontend_node_modules:
