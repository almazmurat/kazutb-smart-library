# ──────────────────────────────────────────────────────────────
#  KazUTB Smart Library — Docker Compose (production)
# ──────────────────────────────────────────────────────────────
#
#  Services
#  --------
#  postgres  — PostgreSQL 18 with existing data
#  app       — Laravel 13 (nginx + php-fpm) on port 80
#
#  Quick start
#  -----------
#  1. Ensure .env is configured
#  2. docker compose up --build -d
#  3. Open http://10.0.1.8
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kazutb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kazutb_library}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kazutb_user} -d ${POSTGRES_DB:-kazutb_library}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel App (nginx + php-fpm) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: "${APP_NAME:-KazUTB Smart Library}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://10.0.1.8}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: "${POSTGRES_DB:-kazutb_library}"
      DB_USERNAME: "${POSTGRES_USER:-kazutb_user}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      EXTERNAL_AUTH_LOGIN_URL: "${EXTERNAL_AUTH_LOGIN_URL:-http://10.0.1.47/api/login}"
      EXTERNAL_AUTH_DEVICE_NAME: "${EXTERNAL_AUTH_DEVICE_NAME:-web}"
    ports:
      - "0.0.0.0:80:80"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost/api/v1/catalog || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: kazutb-smart-library-main_postgres_data
