# ──────────────────────────────────────────────────────────────
#  KazUTB Smart Library — Docker Compose (local / development)
# ──────────────────────────────────────────────────────────────
#
#  Services
#  --------
#  postgres   — PostgreSQL 18 with required extensions
#  backend    — NestJS API  (port 3000)
#  frontend   — React/Vite → nginx SPA + API proxy (port 5173)
#
#  Quick start
#  -----------
#  1. cp .env.example .env   # and fill in secrets
#  2. docker compose up --build
#  3. Open http://localhost:5173
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-kazutb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB:       ${POSTGRES_DB:-kazutb_library}
    volumes:
      # PostgreSQL 18+ stores data in /var/lib/postgresql/<version>/main
      # Mount the parent directory so pg_upgrade works correctly
      - postgres_data:/var/lib/postgresql
    ports:
      # Bind to 0.0.0.0 so other machines on the LAN can connect
      - "0.0.0.0:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kazutb_user} -d ${POSTGRES_DB:-kazutb_library}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              ${NODE_ENV:-production}
      PORT:                  3000
      DATABASE_URL:          postgresql://${POSTGRES_USER:-kazutb_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kazutb_library}
      JWT_SECRET:            ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN:        ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LDAP_URL:              ${LDAP_URL:-}
      LDAP_BIND_DN:          ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD:    ${LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN:          ${LDAP_BASE_DN:-}
      LDAP_USERS_OU:         ${LDAP_USERS_OU:-}
      LDAP_SEARCH_FILTER:    ${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      LDAP_TLS_REJECT_UNAUTHORIZED: ${LDAP_TLS_REJECT_UNAUTHORIZED:-true}
      LDAP_DEV_MOCK:         ${LDAP_DEV_MOCK:-true}
      NODE_EXTRA_CA_CERTS:   /app/certs/kaztbu-DC1-CA.crt
      STORAGE_PATH:          /app/storage
      MAX_FILE_SIZE_MB:      ${MAX_FILE_SIZE_MB:-200}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      LOG_FILE_PATH:         /app/logs/app.log
      RATE_LIMIT_TTL_SECONDS: ${RATE_LIMIT_TTL_SECONDS:-60}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      FRONTEND_URL:          ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - backend_storage:/app/storage
      - backend_logs:/app/logs
      - ./backend/certs:/app/certs:ro
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (React → nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  backend_storage:
  backend_logs:
