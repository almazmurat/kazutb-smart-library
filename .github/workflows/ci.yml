name: Continuous Verification

run-name: Verification • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-quality:
    name: Backend Verification & Coverage
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pdo_sqlite, mbstring, xml, bcmath, ctype, json, tokenizer
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php84-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php84-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ansi

      - name: Run local CI gates
        run: composer qa:ci
        env:
          APP_ENV: testing
          APP_KEY: base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

      - name: Generate PHPUnit coverage and JUnit artifacts
        run: |
          mkdir -p build/test-results
          ./vendor/bin/phpunit \
            --filter='PublicShellTest|CatalogPageTest|AccountPageTest|InternalAccessBoundaryTest|InternalDashboardPageTest|InternalReviewPageTest|InternalStewardshipPageTest|InternalCirculationPageTest|AuthHardeningTest|ReaderAccessProtectionTest|CatalogDbSearchTest|AuthSessionLifecycleTest|AuthSessionMeTest|BookDetailDbTest|AccountReservationsTest|ReservationMutateTest|DocumentManagementTest|IntegrationRateLimitTest' \
            --log-junit build/test-results/phpunit-feature.xml \
            --coverage-clover build/test-results/clover.xml
        env:
          APP_ENV: testing
          APP_KEY: base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

      - name: Enforce minimum coverage threshold
        run: composer qa:coverage-threshold

      - name: Upload backend QA artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-qa-artifacts
          path: build/test-results

      - name: Write backend summary
        if: always()
        run: |
          {
            echo "## Backend verification"
            echo "- PHP 8.4 environment prepared successfully"
            echo "- Local gate: \`composer qa:ci\`"
            echo "- Coverage floor: \`composer qa:coverage-threshold\`"
            echo "- Artifacts uploaded from \`build/test-results\`"
          } >> "$GITHUB_STEP_SUMMARY"

  browser-smoke:
    name: Frontend Build & Browser Smoke
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, mbstring, xml, bcmath, ctype, json, tokenizer
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ansi

      - name: Install Node dependencies
        run: npm ci --no-audit --fund=false --no-update-notifier --loglevel=error

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e
        env:
          CI: true
          APP_ENV: testing
          APP_KEY: base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results/playwright-artifacts

      - name: Write browser summary
        if: always()
        run: |
          {
            echo "## Frontend verification"
            echo "- Node 22 toolchain configured"
            echo "- Commands: \`npm run build\` and \`npm run test:e2e\`"
            echo "- Playwright traces uploaded when available"
          } >> "$GITHUB_STEP_SUMMARY"
