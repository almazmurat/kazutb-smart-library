name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & SQLite Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pdo_sqlite, mbstring, xml, bcmath, ctype, json, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHP lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests (SQLite)
        run: php artisan test --no-interaction
        env:
          APP_ENV: testing
          APP_KEY: base64:testkeyfortestingonlynotproduction=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  test-postgres:
    name: PostgreSQL Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: library_test
          POSTGRES_USER: library_test
          POSTGRES_PASSWORD: library_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U library_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pdo_sqlite, mbstring, xml, bcmath, ctype, json, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PostgreSQL-dependent tests
        run: php artisan test --no-interaction
        env:
          APP_ENV: testing
          APP_KEY: base64:testkeyfortestingonlynotproduction=
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: library_test
          DB_USERNAME: library_test
          DB_PASSWORD: library_test
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
